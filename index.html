<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
    <link rel="stylesheet" href="Styles/style.css">
</head>
<body>
    <div class="page">
        <div class="card">
            <div class="card-header">
                <h1>Age calculator</h1>
                <p>Enter your date of birth to see your exact age</p>
            </div>

            <!-- Input field for date of birth -->
            <div class="field">
                <label for="calBirthDate">Date of birth</label>
                <input type="date" id="calBirthDate" max="" oninput="onDateChange()">
            </div>

            <!-- Button to trigger age calculation -->
            <button class="btn" onclick="calculateAge()">Calculate age</button>

            <!-- Error message display -->
            <div class="error" id="error"></div>

            <!-- Display Age -->
            <div class="result-wrap" id="resultWrap">
                <div class="result-label">Your age</div>
                <div class="stats">
                    <div class="stat">
                        <div class="num" id="lblYears">0</div>
                        <div class="unit">years</div>
                    </div>
                    <div class="stat">
                        <div class="num" id="lblMonths">0</div>
                        <div class="unit">months</div>
                    </div>
                    <div class="stat">
                        <div class="num" id="lblDays">0</div>
                        <div class="unit">days</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <p class="footer">&copy; 2026 &mdash; F.O. Kgatlhanye. All rights reserved.</p>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
